<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="#130F08"/>

  <!-- Warm glow radial -->
  <radialGradient id="glow" cx="60%" cy="30%" r="55%">
    <stop offset="0%" stop-color="#F07828" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#130F08" stop-opacity="0"/>
  </radialGradient>
  <circle cx="256" cy="256" r="256" fill="url(#glow)"/>

  <!-- Amber gradient for the mug body -->
  <linearGradient id="mugGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%"   stop-color="#F8A050"/>
    <stop offset="50%"  stop-color="#F07828"/>
    <stop offset="100%" stop-color="#B85818"/>
  </linearGradient>

  <!-- Gold gradient for foam -->
  <linearGradient id="foamGrad" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%"   stop-color="#FFFDF5"/>
    <stop offset="100%" stop-color="#EEE4C8"/>
  </linearGradient>

  <!-- Mug body -->
  <rect x="148" y="218" width="188" height="188" rx="18" ry="18" fill="url(#mugGrad)"/>

  <!-- Mug handle -->
  <path d="M336 250 Q400 250 400 310 Q400 370 336 370 L336 345 Q372 345 372 310 Q372 275 336 275 Z"
        fill="url(#mugGrad)" stroke="#B85818" stroke-width="3"/>

  <!-- Beer body (darker amber inside mug) -->
  <rect x="163" y="248" width="158" height="148" rx="8" ry="8" fill="#D46820" opacity="0.6"/>

  <!-- Foam blob -->
  <ellipse cx="185" cy="216" rx="20" ry="18" fill="url(#foamGrad)"/>
  <ellipse cx="217" cy="208" rx="25" ry="22" fill="url(#foamGrad)"/>
  <ellipse cx="252" cy="205" rx="28" ry="24" fill="url(#foamGrad)"/>
  <ellipse cx="288" cy="208" rx="24" ry="21" fill="url(#foamGrad)"/>
  <ellipse cx="317" cy="215" rx="18" ry="16" fill="url(#foamGrad)"/>
  <!-- Foam top layer fill -->
  <rect x="163" y="215" width="158" height="22" fill="url(#foamGrad)"/>

  <!-- Foam shine -->
  <ellipse cx="220" cy="207" rx="10" ry="5" fill="white" opacity="0.4"/>
  <ellipse cx="268" cy="204" rx="12" ry="5" fill="white" opacity="0.35"/>

  <!-- Light reflection on mug body -->
  <rect x="164" y="250" width="18" height="100" rx="9" fill="white" opacity="0.12"/>

  <!-- Bubble details inside beer -->
  <circle cx="195" cy="310" r="4" fill="white" opacity="0.15"/>
  <circle cx="235" cy="340" r="3" fill="white" opacity="0.12"/>
  <circle cx="270" cy="295" r="5" fill="white" opacity="0.10"/>
  <circle cx="300" cy="330" r="3" fill="white" opacity="0.13"/>

  <!-- "50&50" text label -->
  <text x="256" y="170"
        font-family="'Arial Black', 'Helvetica Neue', sans-serif"
        font-size="38" font-weight="900"
        fill="#F4C840"
        text-anchor="middle"
        letter-spacing="1">50&amp;50</text>

  <!-- Subtle border ring -->
  <circle cx="256" cy="256" r="248" fill="none" stroke="#F07828" stroke-width="2" opacity="0.2"/>
</svg>
